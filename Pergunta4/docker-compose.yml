services:
  nginx:
    image: nginx:v1
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - app-network

  php:
    image: php:v5
    container_name: php-fpm
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mariadb
    restart: unless-stopped
    networks:
      - app-network

  mariadb:
    image: db:v1
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mariadb-data:
