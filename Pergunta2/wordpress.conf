# =============================================================================
# Nginx + LiteSpeed/LSPHP para WordPress
# =============================================================================

# Definir dentro do contexto http{} do nginx.conf
#
# fastcgi_cache_path /var/cache/nginx/wordpress
#     levels=1:2
#     keys_zone=WORDPRESS:100m
#     inactive=60m
#     max_size=1g;

# -----------------------------------------------------------------------------
# Server único (porta 80, sem redirecionamento para HTTPS)
# -----------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;

    server_name example.com www.example.com;

    root /var/www/wordpress;
    index index.php index.html;

    access_log /var/log/nginx/wordpress_access.log;
    error_log  /var/log/nginx/wordpress_error.log;

    # -------------------------------------------------------------------------
    # Arquivos sensíveis
    # -------------------------------------------------------------------------

    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* wp-config\.php|readme\.html|license\.txt {
        deny all;
    }

    # -------------------------------------------------------------------------
    # Bloqueia execução de PHP em uploads
    # -------------------------------------------------------------------------

    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # -------------------------------------------------------------------------
    # WordPress Permalinks
    # -------------------------------------------------------------------------

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # -------------------------------------------------------------------------
    # PHP -> LiteSpeed LSPHP
    # -------------------------------------------------------------------------

    location ~ \.php$ {

        include fastcgi_params;

        fastcgi_pass unix:/var/run/lsphp/lsphp.sock;
        fastcgi_index index.php;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # ---------------------------------------------------------------------
        # Cache de página
        #
        # Não cachear:
        # - wp-admin
        # - usuários logados
        # - comentários
        # - WooCommerce
        # - requisições POST
        # ---------------------------------------------------------------------

        set $skip_cache 0;

        if ($request_method = POST) {
            set $skip_cache 1;
        }

        if ($query_string != "") {
            set $skip_cache 1;
        }

        if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*\.php|/feed/|index.php") {
            set $skip_cache 1;
        }

        if ($http_cookie ~* "comment_author|wordpress_logged_in|wp-postpass|woocommerce_items_in_cart|woocommerce_cart_hash") {
            set $skip_cache 1;
        }

        fastcgi_cache WORDPRESS;
        fastcgi_cache_valid 200 60m;

        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;

        add_header X-FastCGI-Cache $upstream_cache_status;
    }

    # -------------------------------------------------------------------------
    # Compressão Gzip
    # -------------------------------------------------------------------------

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # -------------------------------------------------------------------------
    # Cache do navegador para arquivos estáticos
    # -------------------------------------------------------------------------

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|webp)$ {

        expires 30d;

        add_header Cache-Control "public, max-age=2592000, immutable";

        access_log off;

        try_files $uri =404;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        allow all;
    }
}